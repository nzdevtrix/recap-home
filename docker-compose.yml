version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: recap
      POSTGRES_PASSWORD: recap123
      POSTGRES_DB: recap_home
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7
    ports:
      - '6379:6379'
volumes:
  postgres_data: